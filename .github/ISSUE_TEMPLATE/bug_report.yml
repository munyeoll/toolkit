name: Bug Report
description: 버그를 신고해주세요
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 신고 감사합니다! 아래 정보를 가능한 자세히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 버그인지 설명해주세요
      placeholder: 무엇이 잘못되었나요?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 방법을 단계별로 알려주세요
      placeholder: |
        1. '...'로 이동
        2. '...' 클릭
        3. '...'까지 스크롤
        4. 오류 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 예상 동작
      description: 원래 어떻게 동작해야 하나요?
      placeholder: 정상적으로 동작했다면 어떻게 되었어야 하나요?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 가능하면 스크린샷을 첨부해주세요
      placeholder: 이미지를 드래그하거나 붙여넣기 하세요
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: 브라우저
      description: 어떤 브라우저에서 발생했나요?
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - 기타
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: 기기
      description: 어떤 기기에서 발생했나요?
      options:
        - 데스크톱
        - 모바일
        - 태블릿
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 그 외 도움이 될 만한 정보가 있으면 알려주세요
      placeholder: 예) 특정 상황에서만 발생, 콘솔 에러 메시지 등
    validations:
      required: false
