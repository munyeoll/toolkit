<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo -->
  <rect x="480" y="180" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="520" y="240" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="600">T</text>

  <!-- Title -->
  <text x="580" y="240" fill="white" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700">ToolKit</text>

  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" fill="#a5b4fc" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400">무료 온라인 개발자 도구 모음</text>

  <!-- Features -->
  <text x="600" y="400" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="20">
    JSON Formatter · Base64 · 정규식 · JWT · 색상 변환 · CSV↔JSON
  </text>
  <text x="600" y="440" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="20">
    글자수 계산 · 텍스트 Diff · 비밀번호 생성 · UUID · 타임스탬프
  </text>

  <!-- URL -->
  <text x="600" y="540" text-anchor="middle" fill="#6366f1" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">munyeoll.github.io/toolkit</text>
</svg>
